# ExternalSecret: tells external-secrets WHAT to fetch from Vault
# and WHERE to store it in Kubernetes.
#
# This creates a Kubernetes Secret called "apollo-credentials" in the
# default namespace, populated with APOLLO_KEY and APOLLO_GRAPH_REF
# from Vault's secret/apollo-router path.
#
# The secret is synced automatically — if you update it in Vault,
# external-secrets updates the Kubernetes Secret within the refresh interval.

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: apollo-credentials
  namespace: default
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: apollo-credentials
    creationPolicy: Owner
  data:
    - secretKey: APOLLO_KEY
      remoteRef:
        key: secret/data/apollo-router
        property: APOLLO_KEY
    - secretKey: APOLLO_GRAPH_REF
      remoteRef:
        key: secret/data/apollo-router
        property: APOLLO_GRAPH_REF
