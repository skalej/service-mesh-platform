# ClusterSecretStore: tells external-secrets HOW to connect to Vault.
#
# This configures the connection to our local Vault dev server.
# external-secrets uses this to fetch secrets and create Kubernetes
# Secrets automatically.
#
# In production, replace with:
#   - AWS Secrets Manager
#   - GCP Secret Manager
#   - Azure Key Vault
#   - HashiCorp Vault (production mode with proper auth)
#
# The dev server uses a root token of "root" — never do this in production.

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: vault
          key: token
