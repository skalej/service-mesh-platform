{{- if .Values.networkPolicy.enabled }}
# NetworkPolicy restricts which pods can send traffic to this service.
# By default, Kubernetes allows all pod-to-pod communication.
# This locks it down so only explicitly listed apps can connect,
# reducing blast radius if a pod is compromised.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "service.name" . }}
  labels:
    {{- include "service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- range .Values.networkPolicy.allowFrom }}
    - from:
        - podSelector:
            matchLabels:
              app: {{ .app }}
      ports:
        {{- range .ports }}
        - port: {{ . }}
          protocol: TCP
        {{- end }}
    {{- end }}
{{- end }}
