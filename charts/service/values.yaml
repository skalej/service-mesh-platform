replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

containerPort: 8080

health:
  path: /health
  port: ""  # defaults to containerPort if empty

env: []  # extra environment variables

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPU: 80

serviceAccount:
  create: true

ingress:
  enabled: false
  className: ""
  annotations: {}
  path: /
  pathType: Prefix

# --- Istio service mesh configuration ---
# All disabled by default — enable per-service in charts/releases/<service>.yaml
istio:
  destinationRule:
    enabled: false
    loadBalancer: LEAST_REQUEST
    connectionPool:
      tcp:
        maxConnections: 10
      http:
        http1MaxPendingRequests: 5
        http2MaxRequests: 10
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 100

  virtualService:
    enabled: false
    timeout: 5s
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: 5xx,reset,connect-failure

  authorizationPolicy:
    enabled: false
    allowFrom: []
    # - namespace: default
    #   serviceAccount: apollo-router

  peerAuthentication:
    enabled: false
    mode: STRICT
    portLevelMtls: {}
    # 8080:
    #   mode: PERMISSIVE
