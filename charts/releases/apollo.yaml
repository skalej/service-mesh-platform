image:
  repository: localhost:5000/apollo-router
  tag: sha-33331da

containerPort: 4000

service:
  port: 4000

health:
  path: /health
  port: 8088

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 3
  targetCPU: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  allowFrom:
    # Kong gateway pod is in the `kong` namespace — namespaceSelector is required
    # because a bare podSelector only matches pods in the same namespace (default).
    - app: kong-gateway
      namespace: kong
      ports: [ 4000 ]

ingress:
  # Disabled — Kong routing is now handled via Gateway API (GatewayClass +
  # Gateway + HTTPRoute + ReferenceGrant in kong/ingress.yaml). The old
  # Kubernetes Ingress cannot route cross-namespace to apollo-router in `default`
  # from the `kong` namespace, so we use Gateway API with a ReferenceGrant instead.
  enabled: false

  # apollo.yaml — no secret values here
env:
  - name: APOLLO_KEY
    valueFrom:
      secretKeyRef:
        name: apollo-credentials    # ← created by ExternalSecret
        key: APOLLO_KEY
  - name: APOLLO_GRAPH_REF
    valueFrom:
      secretKeyRef:
        name: apollo-credentials
        key: APOLLO_GRAPH_REF
