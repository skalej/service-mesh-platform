image:
  repository: localhost:5000/apollo-router
  tag: sha-33331da

containerPort: 4000

service:
  port: 4000

health:
  path: /health
  port: 8088

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 3
  targetCPU: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  allowFrom:
    - app: kong-gateway
      ports: [ 4000 ]

ingress:
  enabled: true
  className: kong
  annotations:
    konghq.com/strip-path: "false"
    konghq.com/plugins: rate-limit
  path: /
  pathType: Prefix

  # apollo.yaml — no secret values here
env:
  - name: APOLLO_KEY
    valueFrom:
      secretKeyRef:
        name: apollo-credentials    # ← created by ExternalSecret
        key: APOLLO_KEY
  - name: APOLLO_GRAPH_REF
    valueFrom:
      secretKeyRef:
        name: apollo-credentials
        key: APOLLO_GRAPH_REF
