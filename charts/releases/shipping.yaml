image:
  repository: localhost:5000/shipping
  tag: sha-65b7cd1

containerPort: 4002

service:
  port: 4002

health:
  path: /health

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  allowFrom:
    - app: apollo-router
      labelKey: "app.kubernetes.io/name"
      ports: [ 4002 ]

istio:
  destinationRule:
    enabled: true

  virtualService:
    enabled: true

  # See catalog.yaml for detailed comments on this pattern.
  requestAuthentication:
    enabled: true
    jwtRules:
      - issuer: "http://localhost:8082/auth/realms/service-mesh"
        jwksUri: "http://keycloak-keycloakx.keycloak.svc.cluster.local/auth/realms/service-mesh/protocol/openid-connect/certs"
        forwardOriginalToken: true

  # Only apollo-router can call shipping — blocks direct access from other services.
  # Additionally requires a valid JWT with the shipping:read scope.
  authorizationPolicy:
    enabled: true
    allowFrom:
      - namespace: default
        serviceAccount: apollo-router
        requiredScopes:
          - "*shipping:read*"

  peerAuthentication:
    enabled: true
    mode: STRICT