image:
  repository: localhost:5000/shipping
  tag: sha-b1194f0

containerPort: 4002

service:
  port: 4002

health:
  path: /health

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  allowFrom:
    - app: apollo-router
      ports: [ 4002 ]

istio:
  destinationRule:
    enabled: true

  virtualService:
    enabled: true

  # Only apollo-router can call shipping — blocks direct access from other services
  authorizationPolicy:
    enabled: true
    allowFrom:
      - namespace: default
        serviceAccount: apollo-router

  peerAuthentication:
    enabled: true
    mode: STRICT