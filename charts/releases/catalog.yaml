image:
  repository: localhost:5000/catalog
  tag: sha-33331da

containerPort: 4001

service:
  port: 4001

health:
  path: /actuator/health

istio:
  destinationRule:
    enabled: true

  virtualService:
    enabled: true

  requestAuthentication:
    enabled: false
    jwtRules:
      - issuer: "https://idp-server.com"
        jwksUri: "https://your-idp.com/.well-known/jwks.json"
  authorizationPolicy:
    enabled: true
    allowFrom:
      - namespace: default
        serviceAccount: apollo-router
  #        requiredScopes:
  #          - "catalog:read"

  peerAuthentication:
    enabled: true
    mode: STRICT
