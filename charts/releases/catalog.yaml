image:
  repository: localhost:5000/catalog
  tag: sha-2919b35

containerPort: 4001

service:
  port: 4001

health:
  path: /actuator/health

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  allowFrom:
    - app: apollo-router
      labelKey: "app.kubernetes.io/name"
      ports: [ 4001 ]

istio:
  destinationRule:
    enabled: true

  virtualService:
    enabled: true

  # RequestAuthentication tells Istio's Envoy sidecar to validate JWTs on incoming
  # requests. Any request with a valid JWT has its claims extracted and made available
  # to AuthorizationPolicy. Requests with NO token are still allowed through here —
  # the AuthorizationPolicy below enforces that only apollo-router (via mTLS service
  # account) can call this service, providing the actual deny-by-default.
  #
  # jwksUri uses the cluster-internal Keycloak URL so istiod can fetch keys without
  # going through the port-forward. The issuer must exactly match the `iss` claim in
  # the JWT — which Keycloak sets to the external URL (localhost:8082 in this dev setup).
  requestAuthentication:
    enabled: true
    jwtRules:
      - issuer: "http://localhost:8082/auth/realms/service-mesh"
        jwksUri: "http://keycloak-keycloakx-http.keycloak.svc.cluster.local/auth/realms/service-mesh/protocol/openid-connect/certs"
        forwardOriginalToken: true
  authorizationPolicy:
    enabled: true
    allowFrom:
      - namespace: default
        serviceAccount: apollo-router
        # Keycloak encodes scopes as a space-separated string in the `scope` claim,
        # e.g. "openid profile email catalog:read". Istio values support glob matching,
        # so *catalog:read* matches any scope string containing that token.
        #
        # Prerequisite: in Keycloak, create a client scope named "catalog:read",
        # add a Hardcoded claim mapper (claim name: scope, value: catalog:read),
        # and assign it as a default scope on the `kong` client.
        requiredScopes:
          - "*catalog:read*"

  peerAuthentication:
    enabled: true
    mode: STRICT
