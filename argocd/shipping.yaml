# ArgoCD Application for the Shipping subgraph.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shipping
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/skalej/service-mesh-platform
    targetRevision: main
    path: charts/service
    helm:
      valueFiles:
        - ../../charts/releases/shipping.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
