name: trivy-scan
description: Scans a Docker image for CVEs using Trivy. Only fails on CRITICAL vulnerabilities that have a fix available — ignores unfixed CVEs since there's no actionable remediation.
author: team
requirements: []

configuration:
  properties:
    service:
      type: string
      description: Service name (e.g. catalog, shipping, apollo-router) — combined with DOCKER_REGISTRY and BUILDKITE_COMMIT to form the full image ref
    severity:
      type: string
      description: Comma-separated severity levels to fail on (default CRITICAL)
    ignore-unfixed:
      type: boolean
      description: Skip CVEs with no available patch (default true)
    exit-code:
      type: string
      description: "Exit code when vulnerabilities are found: 1 to fail, 0 to warn only (default 1)"
    trivyignore:
      type: string
      description: Path to .trivyignore file for allowlisting accepted CVEs (optional)
  required:
    - service
