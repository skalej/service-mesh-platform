# CI pipeline for the Apollo Router
# Triggers on changes to apollo/**
# No lint/test steps — the router is config-driven, so we just build and deploy

env:
  DOCKER_REGISTRY: "localhost:5000"

steps:
  # --- Build & deploy (main branch only) ---

  # NOTE: Trivy scan skipped — requires a real registry (ECR/GCR) or self-hosted agent
  - label: ":docker: Build & Push"
    commands:
      - export IMAGE_TAG="sha-$$(echo $$BUILDKITE_COMMIT | cut -c1-7)"
      - docker build -t $$DOCKER_REGISTRY/apollo-router:$$IMAGE_TAG apollo/
      - docker push $$DOCKER_REGISTRY/apollo-router:$$IMAGE_TAG
    if: "build.branch == 'main'"

  - wait

  # Update the image tag in Helm values — this git push triggers ArgoCD sync
  - label: ":rocket: Update Image Tag"
    commands:
      - export IMAGE_TAG="sha-$$(echo $$BUILDKITE_COMMIT | cut -c1-7)"
      - .buildkite/scripts/update-image-tag.sh apollo $$IMAGE_TAG
    if: "build.branch == 'main'"
