# CI pipeline for the Shipping service (Go)
# Triggers on changes to services/shipping/**
# On main: builds Docker image, updates Helm values, and triggers ArgoCD sync

steps:
  # --- Quality gates (run on all branches / PRs) ---

  - label: ":lint-roller: Lint"
    commands:
      - cd services/shipping
      - golangci-lint run ./...
    plugins:
      - docker#v5.11.0:
          image: "golangci/golangci-lint:latest"
          workdir: /app
          mount-checkout: true

  - label: ":test_tube: Test"
    commands:
      - cd services/shipping
      - go test ./...
    plugins:
      - docker#v5.11.0:
          image: "golang:1.22"
          workdir: /app
          mount-checkout: true

  # Scan commits for accidentally leaked secrets (API keys, tokens, passwords)
  - label: ":closed_lock_with_key: Secret Scan"
    plugins:
      - .buildkite/plugins/gitleaks: {}

  # Validate schema against Apollo GraphOS for composition errors and breaking changes
  - label: ":mag: Schema Check"
    plugins:
      - .buildkite/plugins/schema-publish:
          mode: check
          subgraph-name: shipping
          schema-path: services/shipping/internal/graph/schema.graphqls

  # Wait for lint + test + schema check to pass before building an image
  - wait

  # --- Build & deploy (main branch only) ---

  # Build & push image, and schema publish run in parallel
  # NOTE: Trivy scan skipped — requires a real registry (ECR/GCR) or self-hosted agent
  - label: ":docker: Build & Push"
    commands:
      - export IMAGE_TAG="sha-$$(echo $$BUILDKITE_COMMIT | cut -c1-7)"
      - docker build -t $$DOCKER_REGISTRY/shipping:$$IMAGE_TAG services/shipping/
      - docker push $$DOCKER_REGISTRY/shipping:$$IMAGE_TAG
    if: "build.branch == 'main'"

  - label: ":satellite: Publish Schema"
    plugins:
      - .buildkite/plugins/schema-publish:
          mode: publish
          subgraph-name: shipping
          schema-path: services/shipping/internal/graph/schema.graphqls
          routing-url: http://shipping:4002/graphql
    if: "build.branch == 'main'"

  - wait

  # Update the image tag in Helm values — this git push triggers ArgoCD sync
  - label: ":rocket: Update Image Tag"
    commands:
      - export IMAGE_TAG="sha-$$(echo $$BUILDKITE_COMMIT | cut -c1-7)"
      - .buildkite/scripts/update-image-tag.sh shipping $$IMAGE_TAG
    if: "build.branch == 'main'"
