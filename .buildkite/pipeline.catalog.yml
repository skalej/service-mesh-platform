# CI pipeline for the Catalog service (Spring Boot / Kotlin)
# Triggers on changes to services/catalog/**
# On main: builds Docker image, updates Helm values, and triggers ArgoCD sync

# Non-secret env vars — secrets (APOLLO_KEY) must be set in Buildkite UI
env:
  DOCKER_REGISTRY: "localhost:5000"
  APOLLO_GRAPH_REF: "service-mesh-platform@current"

steps:
  # --- Quality gates (run on all branches / PRs) ---

  - label: ":lint-roller: Lint"
    command: cd services/catalog && ./gradlew ktlintCheck
    plugins:
      - docker#v5.11.0:
          image: "eclipse-temurin:21-jdk"
          workdir: /app
          mount-checkout: true
          volumes:
            - "/tmp/gradle-cache:/root/.gradle"

  - label: ":test_tube: Test"
    command: cd services/catalog && ./gradlew test
    plugins:
      - docker#v5.11.0:
          image: "eclipse-temurin:21-jdk"
          workdir: /app
          mount-checkout: true
          volumes:
            - "/tmp/gradle-cache:/root/.gradle"

  # Scan commits for accidentally leaked secrets (API keys, tokens, passwords)
  - label: ":closed_lock_with_key: Secret Scan"
    plugins:
      - .buildkite/plugins/gitleaks: {}

  # Validate schema against Apollo GraphOS for composition errors and breaking changes
  - label: ":mag: Schema Check"
    plugins:
      - .buildkite/plugins/schema-publish:
          mode: check
          subgraph-name: catalog
          schema-path: services/catalog/src/main/resources/schema/schema.graphqls

  # Wait for lint + test + schema check to pass before building an image
  - wait

  # --- Build & deploy (main branch only) ---

  # Build the image locally (do not push yet — scan first)
  - label: ":docker: Build"
    commands:
      - export IMAGE_TAG="sha-$$(echo $$BUILDKITE_COMMIT | cut -c1-7)"
      - docker build -t $$DOCKER_REGISTRY/catalog:$$IMAGE_TAG services/catalog/
    if: "build.branch == 'main'"

  - wait

  # Scan the built image for CVEs — blocks push if critical vulnerabilities found
  - label: ":shield: Trivy Scan"
    plugins:
      - .buildkite/plugins/trivy-scan:
          service: catalog
    if: "build.branch == 'main'"

  - wait

  # Push and schema publish run in parallel — only reached if scan passes
  - label: ":docker: Push"
    commands:
      - export IMAGE_TAG="sha-$$(echo $$BUILDKITE_COMMIT | cut -c1-7)"
      - docker push $$DOCKER_REGISTRY/catalog:$$IMAGE_TAG
    if: "build.branch == 'main'"

  - label: ":satellite: Publish Schema"
    plugins:
      - .buildkite/plugins/schema-publish:
          mode: publish
          subgraph-name: catalog
          schema-path: services/catalog/src/main/resources/schema/schema.graphqls
          routing-url: http://catalog:4001/graphql
    if: "build.branch == 'main'"

  - wait

  # Update the image tag in Helm values — this git push triggers ArgoCD sync
  - label: ":rocket: Update Image Tag"
    commands:
      - export IMAGE_TAG="sha-$$(echo $$BUILDKITE_COMMIT | cut -c1-7)"
      - .buildkite/scripts/update-image-tag.sh catalog $$IMAGE_TAG
    if: "build.branch == 'main'"
